# SonarCloud / SonarQube configuration
# Excludes non-production code from analysis to focus on application code

sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/*.config.js,\
  **/*.config.cjs,\
  **/*.config.ts,\
  scripts/**,\
  check-*.js,\
  test-*.js,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx
