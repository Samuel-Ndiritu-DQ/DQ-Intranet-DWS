# SonarCloud / SonarQube configuration
# Excludes non-production code from analysis to focus on application code

sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/*.config.js,\
  **/*.config.cjs,\
  **/*.config.ts,\
  scripts/**,\
  check-*.js,\
  test-*.js,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

# Disable specific rules that are false positives or require major refactoring
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8,e9,e10

sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S7781
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.tsx

sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.tsx

sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S138
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.tsx

sonar.issue.ignore.multicriteria.e4.ruleKey=typescript:S134
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*.tsx

sonar.issue.ignore.multicriteria.e5.ruleKey=typescript:S1142
sonar.issue.ignore.multicriteria.e5.resourceKey=**/*.tsx

sonar.issue.ignore.multicriteria.e6.ruleKey=typescript:S1067
sonar.issue.ignore.multicriteria.e6.resourceKey=**/*.tsx

sonar.issue.ignore.multicriteria.e7.ruleKey=typescript:S1854
sonar.issue.ignore.multicriteria.e7.resourceKey=**/*.tsx

sonar.issue.ignore.multicriteria.e8.ruleKey=typescript:S1117
sonar.issue.ignore.multicriteria.e8.resourceKey=**/*.tsx

sonar.issue.ignore.multicriteria.e9.ruleKey=typescript:S1481
